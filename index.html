<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>秘密信箱</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle 120px at 10% 20%, rgba(255, 182, 193, 0.3), transparent),
        radial-gradient(circle 80px at 85% 15%, rgba(255, 154, 185, 0.25), transparent),
        radial-gradient(circle 100px at 20% 80%, rgba(255, 192, 203, 0.28), transparent),
        radial-gradient(circle 90px at 90% 75%, rgba(255, 112, 181, 0.2), transparent),
        radial-gradient(circle 4px at 30% 30%, #ff79a1 50%, transparent 52%),
        radial-gradient(circle 4px at 70% 40%, #ff96b8 50%, transparent 52%),
        radial-gradient(circle 4px at 15% 60%, #ffb6c1 50%, transparent 52%),
        radial-gradient(circle 4px at 80% 25%, #ff87ab 50%, transparent 52%),
        radial-gradient(circle 4px at 65% 85%, #ffc0cb 50%, transparent 52%),
        linear-gradient(135deg, #fff0f6 0%, #fce4ec 30%, #f8bbd0 65%, #f48fb1 100%);
      color: #4a154b;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    body::before, body::after {
      content: "💖";
      position: fixed;
      font-size: 48px;
      opacity: 0.3;
      z-index: 0;
    }

    body::before {
      top: 24px;
      left: 24px;
    }

    body::after {
      bottom: 24px;
      right: 24px;
    }

    .app {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(244, 143, 177, 0.35);
      display: none;
    }

    .panel.active {
      display: block;
    }

    .brand {
      font-size: 14px;
      color: #ad1457;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .brand::before {
      content: "💌";
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 700;
      color: #880e4f;
    }

    .subtitle {
      margin: 0 0 28px;
      color: #6a1b9a;
      line-height: 1.7;
      font-size: 15px;
    }

    .choice-group {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .choice-btn,
    button {
      width: 100%;
      border: none;
      border-radius: 20px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .choice-btn {
      background: rgba(255, 255, 255, 0.7);
      color: #880e4f;
      border: 1px solid rgba(244, 143, 177, 0.4);
      text-align: left;
    }

    .choice-btn::before {
      content: "💌";
      margin-right: 8px;
    }

    .choice-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 20px rgba(244, 143, 177, 0.25);
    }

    .primary-btn {
      background: linear-gradient(135deg, #f06292, #ec407a, #d81b60);
      color: white;
      box-shadow: 0 10px 30px rgba(236, 64, 122, 0.35);
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
      box-shadow: 0 12px 35px rgba(236, 64, 122, 0.4);
    }

    .action-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .small-action-btn {
      width: auto;
      min-width: 220px;
      padding: 8px 18px;
      font-size: 14px;
      border-radius: 12px;
      display: inline-block;
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.7);
      color: #880e4f;
      margin-top: 12px;
      border: 1px solid rgba(244, 143, 177, 0.4);
    }

    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 6px 16px rgba(244, 143, 177, 0.2);
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #ad1457;
      font-size: 14px;
      font-weight: 500;
    }

    input,
    textarea {
      width: 100%;
      padding: 16px 18px;
      margin-bottom: 18px;
      border-radius: 18px;
      border: 1px solid rgba(244, 143, 177, 0.45);
      background: rgba(255, 255, 255, 0.7);
      color: #4a154b;
      font-size: 16px;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #ba68c8;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(236, 64, 122, 0.8);
      box-shadow: 0 0 0 4px rgba(236, 64, 122, 0.15);
      background: rgba(255, 255, 255, 0.9);
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.8;
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      color: #ad1457;
      min-height: 22px;
    }

    .letter-box {
      margin-top: 20px;
      padding: 24px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(244, 143, 177, 0.4);
      color: #4a154b;
      white-space: pre-wrap;
      line-height: 1.9;
      min-height: 180px;
    }

    .top-tip {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(236, 64, 122, 0.15);
      color: #ad1457;
      font-size: 12px;
      border: 1px solid rgba(236, 64, 122, 0.3);
      font-weight: 500;
    }

    .hidden {
      display: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(74, 21, 75, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 999;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(244, 143, 177, 0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(74, 21, 75, 0.35);
      text-align: center;
    }

    .modal::before {
      content: "💖";
      font-size: 40px;
      display: block;
      margin-bottom: 12px;
    }

    .modal h2 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #880e4f;
    }

    .modal p {
      margin: 0 0 20px;
      color: #6a1b9a;
      line-height: 1.8;
      font-size: 15px;
    }

    @media (max-width: 640px) {
      .panel {
        padding: 28px 20px;
        border-radius: 24px;
      }

      h1 {
        font-size: 26px;
      }

      body::before, body::after {
        font-size: 32px;
      }

      .small-action-btn {
        min-width: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel active" id="stepChooseMode">
      <div class="brand">Secret Letter</div>
      <h1>欢迎来到秘密信箱</h1>
      <p class="subtitle">
        你可以写下一封只有知道密码的人才能看到的信，
        也可以输入密码，提取那封已经为你写好的内容。
      </p>

      <div class="choice-group">
        <button class="choice-btn" id="chooseWrite">我要写信</button>
        <button class="choice-btn" id="chooseRead">我要提取信件</button>
      </div>
    </section>

    <section class="panel" id="stepPassword">
      <div class="top-tip" id="modeTip">当前模式：写信</div>
      <h1>请输入密码</h1>
      <p class="subtitle">
        请输入一个 8 位数字密码。后续系统会根据这个密码为你保存或提取信件。
      </p>

      <label for="passwordInput">8 位数字密码</label>
      <input id="passwordInput" type="text" maxlength="8" placeholder="请输入 8 位数字密码" />

      <button class="primary-btn" id="confirmPasswordBtn">确认</button>
      <button class="secondary-btn" id="backToModeBtn">返回上一步</button>

      <div class="message" id="passwordMsg"></div>
    </section>

    <section class="panel" id="stepWriteLetter">
      <div class="top-tip">写信模式</div>
      <h1>写下这封信</h1>
      <p class="subtitle">
        这封信会绑定到你刚刚输入的密码。知道相同密码的人，可以查看这封信。
      </p>

      <label for="letterContent">信件内容</label>
      <textarea id="letterContent" placeholder="请输入你想写下的内容......"></textarea>

      <div class="action-row">
        <button class="primary-btn small-action-btn" id="optimizeLetterBtn">优化信件</button>
        <button class="primary-btn small-action-btn" id="saveLetterBtn">保存信件</button>
      </div>

      <button class="secondary-btn" id="backToPasswordFromWriteBtn">返回修改密码</button>

      <div class="message" id="writeMsg"></div>
    </section>

    <section class="panel" id="stepReadLetter">
      <div class="top-tip">提取信件模式</div>
      <h1>你的信件</h1>
      <p class="subtitle">
        如果数据库中存在对应密码的信件，内容会显示在下方。
      </p>

      <div class="letter-box" id="letterResult">正在加载信件内容...</div>

      <button class="secondary-btn" id="backToPasswordFromReadBtn">返回重新输入密码</button>
      <button class="secondary-btn" id="backToHomeBtn">返回首页</button>

      <div class="message" id="readMsg"></div>
    </section>
  </div>

  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <h2>保存成功</h2>
      <p>把这 8 位密码告诉对方，对方就可以提取这封信。</p>
      <button class="primary-btn" id="goHomeBtn">返回首页</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://eyyzzulqrzbespjfizqr.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_UUyoVsBiMlpz_40xGB1t1w_xM_HFVnc";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    let currentMode = "";
    let currentPassword = "";
    // 新增防抖标记
    let isOptimizing = false;

    const stepChooseMode = document.getElementById("stepChooseMode");
    const stepPassword = document.getElementById("stepPassword");
    const stepWriteLetter = document.getElementById("stepWriteLetter");
    const stepReadLetter = document.getElementById("stepReadLetter");

    const chooseWrite = document.getElementById("chooseWrite");
    const chooseRead = document.getElementById("chooseRead");
    const modeTip = document.getElementById("modeTip");
    const passwordInput = document.getElementById("passwordInput");
    const confirmPasswordBtn = document.getElementById("confirmPasswordBtn");
    const backToModeBtn = document.getElementById("backToModeBtn");
    const passwordMsg = document.getElementById("passwordMsg");

    const letterContent = document.getElementById("letterContent");
    const saveLetterBtn = document.getElementById("saveLetterBtn");
    const backToPasswordFromWriteBtn = document.getElementById("backToPasswordFromWriteBtn");
    const writeMsg = document.getElementById("writeMsg");

    const optimizeLetterBtn = document.getElementById("optimizeLetterBtn");

    const letterResult = document.getElementById("letterResult");
    const readMsg = document.getElementById("readMsg");
    const backToPasswordFromReadBtn = document.getElementById("backToPasswordFromReadBtn");
    const backToHomeBtn = document.getElementById("backToHomeBtn");

    const successModal = document.getElementById("successModal");
    const goHomeBtn = document.getElementById("goHomeBtn");

    function showStep(stepElement) {
      [stepChooseMode, stepPassword, stepWriteLetter, stepReadLetter].forEach(panel => {
        panel.classList.remove("active");
      });
      stepElement.classList.add("active");
    }

    function resetMessages() {
      passwordMsg.textContent = "";
      writeMsg.textContent = "";
      readMsg.textContent = "";
    }

    async function optimizeLetter() {
      // 新增防抖拦截：如果正在优化中直接返回
      if (isOptimizing) return;
      
      const content = letterContent.value.trim();
      writeMsg.textContent = "";

      if (!content) {
        writeMsg.textContent = "请先输入一点信件内容，再进行优化。";
        return;
      }

      // 标记为正在优化中
      isOptimizing = true;
      optimizeLetterBtn.disabled = true;
      optimizeLetterBtn.textContent = "优化中...";

      try {
        const response = await fetch("https://eyyzzulqrzbespjfizqr.supabase.co/functions/v1/optimize-letter", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text: content })
        });

        const data = await response.json();

        if (!response.ok) {
          writeMsg.textContent = data.error || "优化失败，请稍后再试。";
          return;
        }

        if (data.output) {
          letterContent.value = data.output;
          writeMsg.textContent = "优化完成，你可以继续修改后再保存。";
        } else {
          writeMsg.textContent = "没有获取到优化结果。";
        }
      } catch (error) {
        writeMsg.textContent = "优化失败：" + error.message;
      } finally {
        // 重置防抖标记
        isOptimizing = false;
        optimizeLetterBtn.disabled = false;
        optimizeLetterBtn.textContent = "优化信件";
      }
    }

    chooseWrite.addEventListener("click", () => {
      currentMode = "write";
      modeTip.textContent = "当前模式：写信";
      passwordInput.value = "";
      resetMessages();
      showStep(stepPassword);
    });

    chooseRead.addEventListener("click", () => {
      currentMode = "read";
      modeTip.textContent = "当前模式：提取信件";
      passwordInput.value = "";
      resetMessages();
      showStep(stepPassword);
    });

    backToModeBtn.addEventListener("click", () => {
      resetMessages();
      showStep(stepChooseMode);
    });

    backToPasswordFromWriteBtn.addEventListener("click", () => {
      resetMessages();
      showStep(stepPassword);
    });

    backToPasswordFromReadBtn.addEventListener("click", () => {
      resetMessages();
      showStep(stepPassword);
    });

    backToHomeBtn.addEventListener("click", () => {
      resetMessages();
      showStep(stepChooseMode);
    });

    goHomeBtn.addEventListener("click", () => {
      successModal.classList.remove("show");
      resetMessages();
      passwordInput.value = "";
      currentMode = "";
      currentPassword = "";
      showStep(stepChooseMode);
    });

    confirmPasswordBtn.addEventListener("click", async () => {
      const password = passwordInput.value.trim();
      passwordMsg.textContent = "";

      if (!/^\d{8}$/.test(password)) {
        passwordMsg.textContent = "密码必须是 8 位数字。";
        return;
      }

      currentPassword = password;

      if (currentMode === "write") {
        letterContent.value = "";
        showStep(stepWriteLetter);
        return;
      }

      if (currentMode === "read") {
        showStep(stepReadLetter);
        letterResult.textContent = "正在加载信件内容...";
        readMsg.textContent = "";

        const { data, error } = await supabaseClient
          .from("letters")
          .select("content, created_at")
          .eq("password", currentPassword)
          .order("created_at", { ascending: false })
          .limit(1);

        if (error) {
          letterResult.textContent = "";
          readMsg.textContent = "读取失败：" + error.message;
          return;
        }

        if (data && data.length > 0) {
          letterResult.textContent = data[0].content;
        } else {
          letterResult.textContent = "";
          readMsg.textContent = "没有找到对应的信件。";
        }
      }
    });

    saveLetterBtn.addEventListener("click", async () => {
      const content = letterContent.value.trim();
      writeMsg.textContent = "";

      if (!content) {
        writeMsg.textContent = "信件内容不能为空。";
        return;
      }

      const { error } = await supabaseClient
        .from("letters")
        .insert([{ password: currentPassword, content }]);

      if (error) {
        writeMsg.textContent = "保存失败：" + error.message;
        return;
      }

      letterContent.value = "";
      successModal.classList.add("show");
    });

    optimizeLetterBtn.addEventListener("click", optimizeLetter);
  </script>
</body>
</html>
